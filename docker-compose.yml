services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://autopost:secret@db:5432/autopost
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_SHEETS_SPREADSHEET_ID=${GOOGLE_SHEETS_SPREADSHEET_ID}
      - GOOGLE_SHEETS_CLIENT_EMAIL=${GOOGLE_SHEETS_CLIENT_EMAIL}
      - GOOGLE_SHEETS_PRIVATE_KEY=${GOOGLE_SHEETS_PRIVATE_KEY}
      - API_SECRET_KEY=${API_SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=autopost
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=autopost
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autopost"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
